<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Soporte BPLAY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
 <style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Arial;
    background: #0b141a;
  }

  #chat {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 420px;
    margin: auto;
    background: #0b141a;
    border: 1px solid #1f2c34;
  }

  /* HEADER */
  #header {
    background: #202c33;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #111;
  }

  #header img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
  }

  #header div {
    font-size: 14px;
    color: #e9edef;
  }

  #header span {
    font-size: 12px;
    color: #8696a0;
  }

  /* CHAT */
  #messages {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .msg {
    max-width: 80%;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.4;
    white-space: pre-line;
  }

  .bot {
    background: #202c33;
    color: #e9edef;
    align-self: flex-start;
  }

  .user {
    background: #005c4b;
    color: white;
    align-self: flex-end;
  }

  /* BOTONES */
  #options {
    padding: 10px;
    background: #202c33;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #2a3942;
    color: #e9edef;
    text-align: left;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #37474f;
  }

  /* SCROLL */
  #messages::-webkit-scrollbar {
    width: 5px;
  }

  #messages::-webkit-scrollbar-thumb {
    background: #2a3942;
    border-radius: 10px;
  }

  /* BOTÓN WHATSAPP */
  #wpp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 55px;
    height: 55px;
    background: #25d366;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    cursor: pointer;
  }
</style>
</head>

<body>
<div id="chat">
 <div id="header">
  <img src="https://cdn-icons-png.flaticon.com/512/5968/5968841.png">
  <div>
    Soporte BPLAY<br>
    <span>En línea</span>
  </div>
</div>
  <div id="messages"></div>
  <div id="options"></div>
</div>
</div>


<div id="wpp-float" onclick="openWhatsApp()">
  💬
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="chat.js"></script>
<link rel="stylesheet" href="chat.css">
</body>  💬
</div>
</html>
